<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InnerEdge</title>

    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- ALERT -->
<div id="alertBanner"></div>

<!-- ACCOUNT SELECTOR -->
<div style="margin:10px;">
    <label>Account: </label>
    <select id="accountSelector" onchange="switchAccount(this.value)"></select>
</div>

<div class="sidebar">
    <h2>InnerEdge</h2>

    <a href="#" onclick="showPage('dashboard')">Dashboard</a>
    <a href="#" onclick="showPage('trades')">Trades</a>
</div>

<div class="main">

    <!-- DASHBOARD -->
    <div id="dashboardPage">

        <h1>Dashboard</h1>

        <div>
            <h3>Challenge Status: <span id="challengeStatus">ACTIVE</span></h3>
        </div>

        <div class="cards">

            <div class="card"><h3>Balance</h3><p id="balance">Loading...</p></div>
            <div class="card"><h3>Equity</h3><p id="equity">Loading...</p></div>
            <div class="card"><h3>Free Margin</h3><p id="margin">Loading...</p></div>

            <div class="card"><h3>Total Trades</h3><p id="totalTrades">Loading...</p></div>
            <div class="card"><h3>Total Profit</h3><p id="totalProfit">Loading...</p></div>
            <div class="card"><h3>Win Rate</h3><p id="winRate">Loading...</p></div>
            <div class="card"><h3>Profit Factor</h3><p id="profitFactor">Loading...</p></div>

        </div>

        <h2>Equity Curve</h2>
        <canvas id="equityChart"></canvas>

    </div>

    <!-- TRADES PAGE -->
    <div id="tradesPage" style="display:none;">

        <h1>Trades History</h1>

        <table>
            <thead>
                <tr>
                    <th>Ticket</th>
                    <th>Symbol</th>
                    <th>Volume</th>
                    <th>Profit</th>
                    <th>Time</th>
                </tr>
            </thead>

            <tbody id="tradesTable"></tbody>
        </table>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
